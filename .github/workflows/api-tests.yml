name: CI - API Tests

on:
  workflow_dispatch:

jobs:
  api-tests:
    name: Run API tests
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run Cypress API tests
        uses: cypress-io/github-action@v7
        with:
          install: false
          command: npm run cy:run:api -- --record

      - name: Upload Cypress reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports-api
          path: cypress/reports
          if-no-files-found: ignore

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-api
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-api
          path: cypress/videos
          if-no-files-found: ignore

  trigger-front-tests:
    name: Trigger frontend tests
    runs-on: ubuntu-latest
    needs: api-tests
    if: always()

    steps:
      - name: Trigger frontend repository workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.FRONT_REPO_PAT }}
          repository: rafaelpfranco/server_rest_front
          event-type: run-front-tests
          client-payload: '{"source_repository": "server_rest_back", "source_workflow": "ci-api-tests"}'
